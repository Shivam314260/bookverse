<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout | BookVerse</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='checkout.css') }}">
</head>
<body>

<header class="navbar">
    <h1 class="logo">📚 BookVerse</h1>
    <nav>
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/checkout">Checkout</a>
    </nav>
</header>

<section class="checkout-section">
    <h2>Checkout</h2>

    <div class="checkout-container">

        <!-- LEFT: Address & Details -->
        <div class="checkout-form">
            <h3>Shipping Details</h3>

            <form method="post" action="/payment">
                <input type="hidden" name="book_id" value="{{ book[0] }}">
                <input type="hidden" name="quantity" value="{{ quantity }}">
                <input type="hidden" name="total_amount" value="{{ total }}">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullname" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" placeholder="House no, Street, Area" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" required>
                    </div>

                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" name="pincode" required>
                    </div>
                </div>

                <h3>Payment Method</h3>

                <div class="payment-method">
                    <label>
                        <input type="radio" name="paymentmethod" value="cod" checked>
                        <i class="fas fa-money-bill-wave"></i> Cash on Delivery
                    </label>
                </div>

  <div class="order-summary">
    <h3>Order Summary</h3>

    <div class="summary-item">
        <span>{{ book[1] }} (x{{ quantity }})</span>
        <span>₹{{ book[2] }}</span>
    </div>

    <hr>

    <div class="summary-item">
        <strong>Total</strong>
        <strong>₹{{ total }}</strong>
    </div>

    <button type="submit" class="place-order">Place Order</button>
</div>

            </form>
        </div>


    </div>
</section>

<footer class="footer">
    <p>© 2026 BookVerse. All Rights Reserved.</p>
</footer>

</body>
</html>
