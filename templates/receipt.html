<!DOCTYPE html>
<html>
<head>
    <title>Receipt | BookVerse</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='receipt.css') }}">

</head>
<body>

<h2>Order Confirmed 🎉</h2>

<p><strong>Order ID:</strong> {{ order[0] }}</p>
<p><strong>Name:</strong> {{ order[1] }}</p>
<p><strong>Phone:</strong> {{ order[2] }}</p>
<p><strong>Email:</strong> {{ order[3] }}</p>

<p><strong>Book:</strong> {{ order[10] }}</p>
<p><strong>Quantity:</strong> {{ order[8] }}</p>
<p><strong>Total:</strong> ₹{{ order[9] }}</p>

<h3>Shipping Address</h3>
<p>{{ order[4] }}, {{ order[5] }} - {{ order[6] }}</p>

<p><strong>Payment:</strong> {{ order[7] }}</p>

</body>
</html>
